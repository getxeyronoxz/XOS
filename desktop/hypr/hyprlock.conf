general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /usr/share/xos/wallpapers/default.jpg
    blur_passes = 2
    blur_size = 6
    brightness = 0.4
    contrast = 1.0
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(82, 148, 226, 0.8)
    inner_color = rgba(22, 33, 62, 0.95)
    font_color = rgb(E0E0E0)
    fade_on_empty = false
    rounding = 12
    check_color = rgb(82, 148, 226)
    placeholder_text = Enter password...
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = XOS
    color = rgb(E0E0E0)
    font_size = 28
    font_family = Inter
    position = 0, -220
    halign = center
    valign = center
}

label fail {
    monitor =
    text = Authentication failed
    color = rgb(F44336)
    font_size = 14
    font_family = Inter
    position = 0, -60
    halign = center
    valign = center
}
