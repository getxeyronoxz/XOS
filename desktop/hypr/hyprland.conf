# XOS Hyprland configuration
# See XOS_Master_Spec_v4.md for keyboard shortcuts

monitor=,preferred,auto,auto

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Dark

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/local/bin/xos-first-login
exec-once = swww init
exec-once = swww img /usr/share/xos/wallpapers/default.jpg
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 2>/dev/null || true
exec-once = nm-applet --indicator 2>/dev/null || true

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(82,148,226,0.9)
    col.inactive_border = rgba(15,52,96,0.8)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = true
    bezier = xos, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 5, xos
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, xos
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

gestures {
    workspace_swipe = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# XOS keyboard shortcuts
$mainMod = SUPER

bind = $mainMod, SPACE, exec, rofi -show drun -show-icons
bind = $mainMod, T, exec, foot
bind = $mainMod, E, exec, xos-file-manager 2>/dev/null || foot -e ls ~
bind = $mainMod, I, exec, xos-control-center 2>/dev/null || foot -e echo "Control Center unavailable"
bind = $mainMod, A, exec, foot -e echo "XOS Assistant — Phase 4"
bind = , Print, exec, xos-screenshot --clipboard 2>/dev/null || grim - | wl-copy
bind = SHIFT, Print, exec, xos-screenshot --region --save 2>/dev/null || grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, F, togglefloating,
bind = $mainMod, M, fullscreen, 0
bind = $mainMod, Q, killactive,
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = ALT, F4, killactive,

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
