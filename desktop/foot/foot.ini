font=JetBrains Mono:size=11
term=xterm-256color
shell=/bin/bash
title=XOS Terminal
pad=8

[colors]
background=1A1A2E
foreground=E0E0E0
regular0=1A1A2E
regular1=F44336
regular2=4CAF50
regular3=FF9800
regular4=5294E2
regular5=9C27B0
regular6=00BCD4
regular7=E0E0E0
bright0=9E9E9E
bright1=F44336
bright2=4CAF50
bright3=FF9800
bright4=5294E2
bright5=9C27B0
bright6=00BCD4
bright7=FFFFFF

[main]
font=JetBrains Mono:size=11
dpi-aware=no

[cursor]
style=beam
blink=yes

[scrollback]
lines=10000

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
